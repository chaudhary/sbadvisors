---
layout: default
---

<main class="page-content" aria-label="Content">
  {% include header.html %}

  <article class="post" style="max-width: 1200px; margin: 0 auto;padding: 2rem 0;">
    <div class="wrapper">
      <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}</p>
      </header>

      {% if page.image %}
      <div class="post-image" style="margin: 1.5rem 0; border-radius: 8px; overflow: hidden;">
        <img src="{{ page.image | relative_url }}" alt="{{ page.title | escape }}" style="width: 100%; height: auto; display: block;" />
      </div>
      {% endif %}

      <div class="post-content">
        {{ content }}
      </div>
    </div>
  </article>
</main>
